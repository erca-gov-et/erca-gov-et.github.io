<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt Verification</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        margin: 0;
    }

    .container {
        max-width: 600px;
        margin: 40px auto;
        background: #fff;
        padding: 20px;
        border: 1px solid #000;
        display: none;
    }

    .header {
        text-align: center;
        font-weight: bold;
        font-size: 20px;
        border-bottom: 2px solid #000;
        padding-bottom: 10px;
        margin-bottom: 15px;
    }

    .row {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid #ccc;
        padding: 8px 0;
        font-weight: bold;
    }

    .error {
        text-align: center;
        margin-top: 50px;
        font-weight: bold;
        color: red;
    }
</style>
</head>

<body>

<div id="receipt" class="container">

    <div class="header">
        Ministry of Revenue<br>
        Valid Receipt Verification
    </div>

    <div class="row"><div>የደረሰኝ መለያ ቁጥር</div><div>16313</div></div>
    <div class="row"><div>የግብር ከፋይ መለያ ቁጥር</div><div>0000233907</div></div>
    <div class="row"><div>የደረሰኝ ዓይነት</div><div>CREDIT SALES INVOICE</div></div>
    <div class="row"><div>የግብር ከፋዩ ስም</div><div>LEGESSE G/MARIAM OPTICS</div></div>
    <div class="row"><div>ታክስ ማዕከል</div><div>SMALL TAX PAYERS OFFICE</div></div>
    <div class="row"><div>VAT መለያ ቁጥር</div><div>62272</div></div>
    <div class="row"><div>VAT ቁጥር</div><div>46934</div></div>
    <div class="row"><div>ማተሚያ ቤት</div><div>BERHANENA SELAM PRINTING</div></div>

</div>

<div id="error" class="error"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("ENC_SEQ_NUM");

    const validCode = "71DDF2EDDB1C6F42210FE025ED5A1734";

    if (code === validCode) {
        document.getElementById("receipt").style.display = "block";
    } else {
        document.getElementById("error").innerText = "❌ Invalid or Missing Receipt Code";
    }
</script>

</body>
</html>
